version: '3.8'

services:
  app:
    container_name: ldc-shop
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database
      - POSTGRES_URL=postgresql://postgres:postgres@db:5432/ldc_shop
      
      - NEXT_PUBLIC_APP_URL=https://shop.aini8.com
      - AUTH_URL=https://shop.aini8.com
      - AUTH_TRUST_HOST=true
      # Must match Linux DO Connect app (Client ID / Secret), not payment keys only.
      - OAUTH_CLIENT_ID=8f3sIKPQM6hd9Ebdp4J5FlCVMNp4zQ51
      - OAUTH_CLIENT_SECRET=4cZn5e7MbSOywii2S741MOd7tfLE6NJ6
      - MERCHANT_ID=8f3sIKPQM6hd9Ebdp4J5FlCVMNp4zQ51
      - MERCHANT_KEY=4cZn5e7MbSOywii2S741MOd7tfLE6NJ6
      - ADMIN_USERS=omg_lol
      
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: ldc-shop-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ldc_shop
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
